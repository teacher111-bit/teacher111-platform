    <script>
        const SUPABASE_URL = 'https://cvqhvtpbfodwbjobaytj.supabase.co';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const authView = document.getElementById('authView');

        const homeView = document.getElementById('homeView');

        const headerUserEmail = document.getElementById('headerUserEmail');

        function setActiveView(viewId) { const views = [homeView, courseDetailView, projectView]; views.forEach(v => { if(v) v.classList.remove('active-view'); }); const target = document.getElementById(viewId); if(target) target.classList.add('active-view'); }

        function showAuthPage() { authView.classList.add('active-view'); appView.classList.remove('active-view'); document.getElementById('loginMessage').innerHTML = ''; document.getElementById('regMessage').innerHTML = ''; document.getElementById('loginEmail').value = ''; document.getElementById('loginPassword').value = ''; document.getElementById('regEmail').value = ''; document.getElementById('regPassword').value = ''; }
        function showApp(userEmail) { authView.classList.remove('active-view'); appView.classList.add('active-view'); if (headerUserEmail && userEmail) headerUserEmail.textContent = userEmail; showHome(); }
        async function updateHeaderFromSession() { const { data: { user } } = await supabase.auth.getUser(); if (user && headerUserEmail) headerUserEmail.textContent = user.email; }
        const coursesData = { clone: { title: "🌱 克隆魔法育绣球", subtitle: "原理学习：绣球花扦插原理、插穗与基质适配逻辑", video: "🎬 原理动画 | 为什么绣球花可以'克隆'？植物细胞全能性解析", syllabus: ["✓ 扦插繁殖的原理与优势","✓ 绣球花生长特性与最佳扦插时机","✓ 插穗选取标准：半木质化枝条识别","✓ 基质适配：泥炭土+珍珠岩的科学配比","✓ 环境因子：温度、湿度对生根的影响"], features: ["🔬 微观视角展示根原基形成","📊 不同基质对比实验数据","🌡️ 光照与温湿度模拟工具","📖 电子版育苗手册"] }, cutting: { title: "✂️ 巧手扦插育绣球", subtitle: "前期准备：绣球花插穗的修剪与处理", video: "🎬 实操演示 | 修剪技法、消毒与生根剂使用", syllabus: ["✓ 插穗剪切技巧：下斜口上平口","✓ 叶片保留数量与蒸腾平衡","✓ 杀菌消毒方法：多菌灵浸泡","✓ 生根剂（萘乙酸）浓度与蘸取方式","✓ 插穗分级与批次管理"], features: ["✂️ 修剪前后对比图解","🧪 生根剂浓度计算工具","🖐️ 手部实操慢动作演示","📋 插穗质量评价表"] }, care: { title: "🏡 绣球安家小妙招", subtitle: "实操演练：绣球花扦插实操与环境管理", video: "🎬 全流程跟练 | 从插穗到上盆的精细管理", syllabus: ["✓ 扦插深度与间距控制","✓ 喷雾保湿与覆盖薄膜技巧","✓ 愈伤组织观察与生根判断","✓ 炼苗移栽关键步骤","✓ 肥水管理与病虫害预防"], features: ["💧 自动喷雾定时策略","🌱 生根周期记录卡片","📱 远程环境监测参考","🎓 园艺师经验分享"] } };
        function renderCourseDetail(courseId) { const course = coursesData[courseId]; if (!course) return; const html = `<button class="back-link" id="backHomeFromDetail">← 返回首页</button><div class="detail-header"><h2>${course.title}</h2><p>${course.subtitle}</p></div><div class="video-placeholder">${course.video}</div><div class="two-columns"><div class="syllabus"><h3>📖 课程大纲</h3><ul>${course.syllabus.map(item => `<li>${item}</li>`).join('')}</ul></div><div class="features"><h3>⭐ 课程特色</h3><ul>${course.features.map(item => `<li>${item}</li>`).join('')}</ul><button id="dynamicProjectBtn" class="project-btn">🌿 实战闯关 → 检验知识</button><button id="dynamicStartBtn" class="action-btn" style="background:#2d6a4f; margin-top:16px;">开始学习视频</button></div></div>`; dynamicDetailContainer.innerHTML = html; document.getElementById('dynamicProjectBtn')?.addEventListener('click', () => showProject()); document.getElementById('dynamicStartBtn')?.addEventListener('click', () => alert('📺 教学视频正在精心录制中，即将上线！先通过闯关测验巩固知识吧~')); document.getElementById('backHomeFromDetail')?.addEventListener('click', showHome); }
        const gardeningQuestions = [{ id:1, text:"绣球花扦插最适宜的季节是？", options:["春季 (3-4月)","盛夏 (7月)","严冬 (12月)","深秋 (11月)"], answer:0 },{ id:2, text:"以下哪种基质组合最适合绣球花扦插？", options:["纯园土","泥炭土+珍珠岩 (3:1)","河沙+黏土","腐叶土+稻壳炭"], answer:1 },{ id:3, text:"插穗剪切时，下切口应如何处理？", options:["平切","斜切45°","锯齿状切","任意切法"], answer:1 },{ id:4, text:"扦插后，为保持湿度通常采用哪种方法？", options:["强光直射","覆盖薄膜保湿","大量浇水淹没","完全不浇水"], answer:1 },{ id:5, text:"生根剂（如萘乙酸）的主要作用是？", options:["杀菌","促进细胞分裂和根原基形成","提供营养","抑制叶片生长"], answer:1 },{ id:6, text:"绣球花插穗生根适宜的温度范围是？", options:["5-10℃","15-25℃","30-35℃","40℃以上"], answer:1 }];
        let userGardeningAnswers = new Array(gardeningQuestions.length).fill(null);
        function renderGardeningQuestions() { const container = document.getElementById('questionsList'); if(!container) return; userGardeningAnswers = new Array(gardeningQuestions.length).fill(null); let html = ''; gardeningQuestions.forEach((q, idx) => { html += `<div class="question-item" data-qidx="${idx}"><div class="question-text">${idx+1}. ${q.text}</div><div class="options">${q.options.map((opt, optIdx) => `<label class="option"><input type="radio" name="gardening_q${idx}" value="${optIdx}"> ${String.fromCharCode(65+optIdx)}. ${opt}</label>`).join('')}</div></div>`; }); container.innerHTML = html; for(let i=0; i<gardeningQuestions.length; i++) { const radios = document.querySelectorAll(`input[name="gardening_q${i}"]`); radios.forEach(radio => { radio.addEventListener('change', (e) => { userGardeningAnswers[i] = parseInt(e.target.value); }); }); } const resultDiv = document.getElementById('quizResult'); if(resultDiv) resultDiv.innerHTML = ''; }
        function computeGardeningScore() { let correct = 0; gardeningQuestions.forEach((q, idx) => { if(userGardeningAnswers[idx] !== null && userGardeningAnswers[idx] === q.answer) correct++; }); const total = gardeningQuestions.length; const percentage = Math.round((correct/total)*100); let message = ''; if (percentage === 100) message = '🏆 园艺大师！满分通过！'; else if (percentage >= 70) message = '🎉 优秀！你已经掌握了绣球花扦插核心技巧！'; else message = '🌱 再复习一下课程内容，下次会更棒~'; return { correct, total, percentage, message }; }

        async function register(email, password) { const { data, error } = await supabase.auth.signUp({ email, password }); if (error) throw error; return data; }

        async function checkAuth() { const { data: { session } } = await supabase.auth.getSession(); if (session && session.user) { showApp(session.user.email); } else { showAuthPage(); } }
        supabase.auth.onAuthStateChange((event, session) => { if (event === 'SIGNED_IN' && session) { showApp(session.user.email); } else if (event === 'SIGNED_OUT') { showAuthPage(); } else { checkAuth(); } });
        function bindEvents() { document.getElementById('doLogin').addEventListener('click', async () => { const email = document.getElementById('loginEmail').value.trim(); const pwd = document.getElementById('loginPassword').value.trim(); const msgDiv = document.getElementById('loginMessage'); if (!email || !pwd) { msgDiv.innerHTML = '<div class="error-message">请填写邮箱和密码</div>'; return; } try { await login(email, pwd); } catch(e) { msgDiv.innerHTML = `<div class="error-message">${e.message}</div>`; } }); document.getElementById('doRegister').addEventListener('click', async () => { const email = document.getElementById('regEmail').value.trim(); const pwd = document.getElementById('regPassword').value.trim(); const msgDiv = document.getElementById('regMessage'); if (pwd.length < 6) { msgDiv.innerHTML = '<div class="error-message">密码至少6位</div>'; return; } if (!email) { msgDiv.innerHTML = '<div class="error-message">请输入邮箱</div>'; return; } try { await register(email, pwd); msgDiv.innerHTML = '<div class="success-message">注册成功！请登录</div>'; document.querySelector('[data-tab="login"]').click(); document.getElementById('loginEmail').value = email; } catch(e) { msgDiv.innerHTML = `<div class="error-message">${e.message}</div>`; } }); document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { const tab = btn.getAttribute('data-tab'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('loginForm').classList.toggle('active-form', tab === 'login'); document.getElementById('registerForm').classList.toggle('active-form', tab === 'register'); }); }); document.getElementById('headerLogout').addEventListener('click', logout); document.getElementById('navHome').addEventListener('click', (e) => { e.preventDefault(); showHome(); }); document.getElementById('logoHome').addEventListener('click', () => { showHome(); }); document.getElementById('navCourses').addEventListener('click', (e) => { e.preventDefault(); alert('🌿 当前开放三门绣球花扦插专题课程，点击卡片即可学习'); }); document.getElementById('navProfile').addEventListener('click', async (e) => { e.preventDefault(); const { data: { user } } = await supabase.auth.getUser(); alert(`📚 ${user?.email || '学员'}，您的学习数据已安全存储在云端。继续加油！`); }); const cards = document.querySelectorAll('.course-card'); cards.forEach(card => { const courseType = card.getAttribute('data-course'); card.addEventListener('click', (e) => { if(e.target.classList.contains('btn-learn')) e.stopPropagation(); if(courseType === 'clone') showCourseDetail('clone'); else if(courseType === 'cutting') showCourseDetail('cutting'); else if(courseType === 'care') showCourseDetail('care'); }); const btn = card.querySelector('.btn-learn'); if(btn) btn.addEventListener('click', (e) => { e.stopPropagation(); if(courseType === 'clone') showCourseDetail('clone'); else if(courseType === 'cutting') showCourseDetail('cutting'); else if(courseType === 'care') showCourseDetail('care'); }); }); document.getElementById('backToCourseFromQuiz')?.addEventListener('click', () => { if(currentCourseId) showCourseDetail(currentCourseId); else showHome(); }); document.getElementById('submitQuizAnswers')?.addEventListener('click', submitQuiz); }
        function init() { bindEvents(); checkAuth(); }
        init();
    </script>
</body>
